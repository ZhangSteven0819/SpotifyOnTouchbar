<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050505"/>
      <stop offset="0.45" stop-color="#0B0E0B"/>
      <stop offset="1" stop-color="#020202"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(800 420) rotate(90) scale(360 520)">
      <stop offset="0" stop-color="#62FF4A" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#21B32D" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="330" y1="180" x2="1270" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#171717"/>
      <stop offset="0.55" stop-color="#0C0C0C"/>
      <stop offset="1" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="iconEdge" x1="520" y1="260" x2="1080" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A7FF8D" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#46D650" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#1E8D23" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="iconFill" x1="610" y1="290" x2="980" y2="610" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2A7D25"/>
      <stop offset="0.5" stop-color="#0F4D11"/>
      <stop offset="1" stop-color="#081F09"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1600" height="900" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="36" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="softGlow" x="0" y="0" width="1600" height="900" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="800" cy="420" rx="480" ry="320" fill="url(#glow)" filter="url(#softGlow)"/>

  <g filter="url(#shadow)">
    <rect x="280" y="130" width="1040" height="640" rx="76" fill="url(#card)" stroke="#334234" stroke-opacity="0.75" stroke-width="2"/>
    <rect x="300" y="150" width="1000" height="600" rx="66" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1.5"/>
  </g>

  <g transform="translate(0 8)">
    <circle cx="800" cy="390" r="205" fill="url(#iconFill)" stroke="url(#iconEdge)" stroke-width="12"/>
    <circle cx="800" cy="390" r="205" fill="none" stroke="#A6FF8A" stroke-opacity="0.14" stroke-width="2"/>

    <path d="M705 370C741 346 853 346 895 369" stroke="#B5FF93" stroke-width="26" stroke-linecap="round" opacity="0.95"/>
    <path d="M694 425C737 398 863 399 909 426" stroke="#A7FF83" stroke-width="24" stroke-linecap="round" opacity="0.95"/>
    <path d="M705 482C742 458 850 458 893 481" stroke="#90FF6F" stroke-width="22" stroke-linecap="round" opacity="0.95"/>

    <path d="M640 514C695 563 896 564 959 515" stroke="#65FF4D" stroke-width="10" stroke-linecap="round" opacity="0.24" filter="url(#softGlow)"/>
  </g>

  <g font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" text-anchor="middle">
    <text x="800" y="192" font-size="34" font-weight="700" fill="#EDEDED" letter-spacing="0.3">Spotify on Touchbar</text>
    <text x="800" y="242" font-size="24" font-weight="500" fill="#91FF78" opacity="0.95">Installed successfully</text>
    <text x="800" y="278" font-size="16" font-weight="500" fill="#A5A5A5">Ready to follow Spotify automatically and detect your system language</text>
  </g>

  <g font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g transform="translate(435 606)">
      <rect width="730" height="78" rx="24" fill="#101410" stroke="#2C3D2D" stroke-opacity="0.85"/>
      <circle cx="44" cy="39" r="17" fill="#0A1B0B" stroke="#89FF74" stroke-width="2"/>
      <path d="M36 39L42 45L54 33" stroke="#89FF74" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="86" y="35" font-size="20" font-weight="700" fill="#F0F0F0">Auto follows Spotify</text>
      <text x="86" y="58" font-size="15" font-weight="500" fill="#99A199">Launches when Spotify starts, quits when Spotify stops</text>
    </g>

    <g transform="translate(435 700)">
      <rect width="355" height="72" rx="22" fill="#101410" stroke="#2B3D2B" stroke-opacity="0.85"/>
      <text x="30" y="31" font-size="18" font-weight="700" fill="#F0F0F0">System language aware</text>
      <text x="30" y="52" font-size="14" font-weight="500" fill="#96A096">Falls back to English if needed</text>
    </g>

    <g transform="translate(810 700)">
      <rect width="355" height="72" rx="22" fill="#101410" stroke="#2B3D2B" stroke-opacity="0.85"/>
      <text x="30" y="31" font-size="18" font-weight="700" fill="#F0F0F0">Menu bar language menu</text>
      <text x="30" y="52" font-size="14" font-weight="500" fill="#96A096">Popular languages are available</text>
    </g>
  </g>
</svg>
